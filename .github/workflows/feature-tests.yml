name: Feature Tests

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cli-feature-tests:
    name: CLI Feature Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install test utilities (xmllint, jq)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils jq

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/bridgelab-cli/target
          key: ${{ runner.os }}-cli-${{ hashFiles('tools/bridgelab-cli/Cargo.lock') }}

      - name: Build CLI
        working-directory: tools/bridgelab-cli
        run: cargo build --release

      - name: Test - validate valid file (should exit 0)
        run: |
          ./tools/bridgelab-cli/target/release/bridgelab-cli validate tests/fixtures/hl7/adt_a01_small.hl7
          echo "BL-CLI-01 PASSED"

      - name: Test - validate invalid file (should exit 1)
        run: |
          if ./tools/bridgelab-cli/target/release/bridgelab-cli validate tests/fixtures/hl7/invalid_structure.hl7; then
            echo "BL-CLI-02 FAILED: expected non-zero exit"
            exit 1
          else
            echo "BL-CLI-02 PASSED"
          fi

      - name: Test - JSON output is valid
        run: |
          ./tools/bridgelab-cli/target/release/bridgelab-cli validate tests/fixtures/hl7/adt_a01_small.hl7 --format json | jq .
          echo "BL-CLI-03 PASSED"

      - name: Test - JUnit XML output
        run: |
          ./tools/bridgelab-cli/target/release/bridgelab-cli validate tests/fixtures/hl7/adt_a01_small.hl7 --format junit > /tmp/junit.xml
          xmllint --noout /tmp/junit.xml
          echo "BL-CLI-04 PASSED"

      - name: Test - info command shows correct metadata
        run: |
          OUTPUT=$(./tools/bridgelab-cli/target/release/bridgelab-cli info tests/fixtures/hl7/adt_a01_small.hl7 --json)
          echo "$OUTPUT" | jq -e '.[0].message_type == "ADT^A01"' > /dev/null
          echo "$OUTPUT" | jq -e '.[0].version == "2.5"' > /dev/null
          echo "BL-CLI-06/07 PASSED"

      - name: Test - anonymize removes PHI
        run: |
          ORIGINAL=$(cat tests/fixtures/hl7/adt_a01_small.hl7)
          ANON=$(./tools/bridgelab-cli/target/release/bridgelab-cli anonymize tests/fixtures/hl7/adt_a01_small.hl7)
          if echo "$ANON" | grep -q "DOE\^JOHN"; then
            echo "BL-CLI-08 FAILED: patient name not redacted"
            exit 1
          fi
          if echo "$ANON" | grep -q "REDACTED"; then
            echo "BL-CLI-08 PASSED"
          else
            echo "BL-CLI-08 FAILED: expected REDACTED in output"
            exit 1
          fi

      - name: Test - to-json conversion
        run: |
          JSON=$(./tools/bridgelab-cli/target/release/bridgelab-cli to-json tests/fixtures/hl7/adt_a01_small.hl7)
          echo "$JSON" | jq -e '.message_type == "ADT^A01"' > /dev/null
          echo "$JSON" | jq -e '.segments | length >= 5' > /dev/null
          echo "BL-CLI-10 PASSED"

      - name: Test - batch directory
        run: |
          # Batch is expected to exit non-zero because fixtures include
          # intentionally-invalid files (invalid_structure.hl7). We validate
          # that the JSON output is well-formed and contains expected fields.
          ./tools/bridgelab-cli/target/release/bridgelab-cli batch tests/fixtures/hl7 --json > /tmp/batch.json || true
          jq . /tmp/batch.json > /dev/null
          TOTAL=$(jq '.total_files' /tmp/batch.json)
          VALID=$(jq '.valid_files' /tmp/batch.json)
          FAILED=$(jq '.failed_files' /tmp/batch.json)
          if [ "$TOTAL" -lt 3 ]; then
            echo "BL-CLI-11 FAILED: expected at least 3 files, got $TOTAL"
            cat /tmp/batch.json
            exit 1
          fi
          if [ "$VALID" -lt 1 ]; then
            echo "BL-CLI-11 FAILED: expected at least 1 valid file"
            cat /tmp/batch.json
            exit 1
          fi
          echo "BL-CLI-11/12 PASSED: total=$TOTAL valid=$VALID failed=$FAILED"

      - name: Test - info across fixtures (BL-PARSER-02/03)
        run: |
          CLI=./tools/bridgelab-cli/target/release/bridgelab-cli
          # In HL7 v2.5.1+ MSH-9 is 3-component (code^event^structure, e.g.
          # "ADT^A01^ADT_A01") whereas earlier versions commonly use 2 (e.g.
          # "ADT^A01"). Prefix match keeps the assertion version-agnostic.
          check_prefix() {
            case "$1" in "$2"*) return 0 ;; *) return 1 ;; esac
          }
          for f in tests/fixtures/hl7/adt_a01_small.hl7 \
                   tests/fixtures/hl7/adt_a01_v2.5.1.hl7 \
                   tests/fixtures/hl7/orm_o01_multisegment.hl7 \
                   tests/fixtures/hl7/oru_r01_with_base64.hl7; do
            OUT=$($CLI info "$f" --json)
            TYPE=$(echo "$OUT" | jq -r '.[0].message_type')
            VER=$(echo "$OUT"  | jq -r '.[0].version')
            echo "  $f -> $TYPE v$VER"
            case "$f" in
              *adt_a01_small*)
                check_prefix "$TYPE" "ADT^A01" && [ "$VER" = "2.5" ]   || exit 1 ;;
              *adt_a01_v2.5.1*)
                check_prefix "$TYPE" "ADT^A01" && [ "$VER" = "2.5.1" ] || exit 1 ;;
              *orm_o01_multiseg*)
                check_prefix "$TYPE" "ORM^O01"                         || exit 1 ;;
              *oru_r01_with_base64*)
                check_prefix "$TYPE" "ORU^R01"                         || exit 1 ;;
            esac
          done
          echo "BL-PARSER-02/03 PASSED"

      - name: Test - truncation of large fields (BL-PERF-03)
        run: |
          JSON=$(./tools/bridgelab-cli/target/release/bridgelab-cli to-json \
                 tests/fixtures/hl7/oru_r01_with_base64.hl7)
          HAS_TRUNC=$(echo "$JSON" | jq -r '
            [.segments[]?.fields[]? | .. | objects | select(has("truncated"))]
            | length')
          if [ -z "$HAS_TRUNC" ] || [ "$HAS_TRUNC" = "null" ]; then
            echo "Could not introspect truncation marker; checking textual form"
          fi
          # Fallback text check: truncation marker is rendered as {...N bytes}
          ./tools/bridgelab-cli/target/release/bridgelab-cli info \
            tests/fixtures/hl7/oru_r01_with_base64.hl7 --json \
            | jq -e '.[0].truncation_count > 0' > /dev/null
          echo "BL-PERF-03 PASSED"

      - name: Test - JUnit XML is well-formed across fixtures
        run: |
          CLI=./tools/bridgelab-cli/target/release/bridgelab-cli
          for f in tests/fixtures/hl7/*.hl7; do
            $CLI validate "$f" --format junit > /tmp/x.xml || true
            xmllint --noout /tmp/x.xml
          done
          echo "BL-CLI-04 (all fixtures) PASSED"

      - name: Test - anonymize preserves segment count (BL-ANON-10)
        run: |
          CLI=./tools/bridgelab-cli/target/release/bridgelab-cli
          for f in tests/fixtures/hl7/adt_a01_small.hl7 \
                   tests/fixtures/hl7/adt_a01_v2.5.1.hl7; do
            ORIG_SEG=$(grep -c '^[A-Z][A-Z0-9][A-Z0-9]|' "$f" || true)
            ANON_SEG=$($CLI anonymize "$f" | grep -c '^[A-Z][A-Z0-9][A-Z0-9]|' || true)
            if [ "$ORIG_SEG" != "$ANON_SEG" ]; then
              echo "BL-ANON-10 FAILED: $f orig=$ORIG_SEG anon=$ANON_SEG"
              exit 1
            fi
          done
          echo "BL-ANON-10 PASSED"

      - name: Test - validate missing MSH-9 detected (BL-VALID-03)
        run: |
          CLI=./tools/bridgelab-cli/target/release/bridgelab-cli
          OUT=$($CLI validate tests/fixtures/hl7/missing_msh9.hl7 --format json || true)
          echo "$OUT" | jq -e '.issues | map(select(.rule_id | startswith("MSH"))) | length > 0' > /dev/null
          echo "BL-VALID-03 PASSED"

  fhir-fixture-tests:
    name: FHIR Fixture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate FHIR fixtures parse as JSON (BL-FHIR-01)
        run: |
          for f in tests/fixtures/fhir/*.json; do
            jq -e '.resourceType' "$f" > /dev/null
            echo "  $f -> $(jq -r '.resourceType' "$f")"
          done
          echo "BL-FHIR-01 (fixtures) PASSED"

      - name: Detect Bundle vs single resource (BL-BUNDLE-02)
        run: |
          for f in tests/fixtures/fhir/bundle_*.json; do
            TYPE=$(jq -r '.resourceType' "$f")
            ENTRIES=$(jq -r '.entry | length' "$f")
            [ "$TYPE" = "Bundle" ] || { echo "Expected Bundle in $f"; exit 1; }
            [ "$ENTRIES" -gt 0 ]  || { echo "Bundle $f has no entries"; exit 1; }
            echo "  $f -> $ENTRIES entries"
          done
          echo "BL-BUNDLE-02 (fixtures) PASSED"

      - name: Detect dangling references (BL-BUNDLE-06)
        run: |
          # Collect all entry.fullUrl + entry.resource.id, then check references
          F=tests/fixtures/fhir/dangling_bundle.json
          jq '.' "$F" > /dev/null
          HAS_REFS=$(jq -r '[.. | objects | .reference? // empty] | length' "$F")
          [ "$HAS_REFS" -gt 0 ] || { echo "Expected references in $F"; exit 1; }
          echo "BL-BUNDLE-06 fixture intact ($HAS_REFS refs)"

  rust-feature-tests:
    name: Rust Core Feature Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev build-essential

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-feat-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Run full test suite
        working-directory: src-tauri
        run: cargo test --all -- --nocapture

      - name: Schema lookup tests (BL-INSP-05 backend)
        working-directory: src-tauri
        run: |
          # Re-run only the HL7 tables tests with output for traceability
          cargo test --all parser::hl7::tables -- --nocapture

      - name: Test keygen tool
        working-directory: tools/bridgelab-keygen
        run: cargo build --release

      - name: Generate and verify a license (integration test)
        run: |
          cd tools/bridgelab-keygen
          ./target/release/bridgelab-keygen generate-keypair \
            --private /tmp/test-priv.key --public /tmp/test-pub.key

          KEY=$(./target/release/bridgelab-keygen generate \
            --private /tmp/test-priv.key \
            --license-type pro \
            --licensee "Test Co" \
            --email test@test.com \
            --days 365)

          ./target/release/bridgelab-keygen verify \
            --public /tmp/test-pub.key \
            "$KEY"

          echo "BL-LIC-14 PASSED"
